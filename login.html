<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - GreenProof</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Load Pi Network SDK v2.0 -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <style>
        /* --- CSS VARIABLES --- */
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --pi-purple: #7b2cbf;
            --pi-purple-dark: #5a189a;
            --bg-gradient: linear-gradient(135deg, #f0fdf4 0%, #e0e7ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --error: #ef4444;
            --success: #10b981;
        }

        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            position: relative;
            overflow: hidden;
        }

        /* --- BACKGROUND ANIMATION SHAPES --- */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s infinite ease-in-out;
        }
        .shape-1 {
            width: 400px; height: 400px;
            background: rgba(16, 185, 129, 0.2);
            top: -100px; left: -100px;
            animation-delay: 0s;
        }
        .shape-2 {
            width: 300px; height: 300px;
            background: rgba(123, 44, 191, 0.15);
            bottom: -50px; right: -50px;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 30px); }
        }

        /* --- LOGIN CARD --- */
        .login-card {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 420px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .login-card:hover { transform: translateY(-5px); }

        .logo-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 15px;
            display: inline-block;
            animation: pulse-green 2s infinite;
        }

        h1 { font-size: 1.8rem; color: var(--text-main); margin-bottom: 8px; font-weight: 700; }
        p.subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 30px; line-height: 1.5; }

        /* --- BUTTON STYLES --- */
        .btn-pi {
            background: var(--pi-purple);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-pi::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }

        .btn-pi:hover { background: var(--pi-purple-dark); box-shadow: 0 10px 20px rgba(123, 44, 191, 0.3); transform: translateY(-2px); }
        .btn-pi:hover::before { transform: translateX(100%); }
        .btn-pi:active { transform: translateY(0); }
        .btn-pi.disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }
        
        /* State Classes */
        .btn-pi.loading { background: var(--pi-purple); cursor: wait; }
        .btn-pi.success { background: var(--success); cursor: default; }
        .btn-pi.error { background: var(--error); cursor: default; }

        /* --- LOADING SPINNER --- */
        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        .btn-pi.loading .spinner { display: block; }
        .btn-pi.loading .btn-text { opacity: 0.8; }
        .btn-pi.loading::before { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse-green { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* --- RESPONSIVE --- */
        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
    
    <!-- CONFIG SCRIPT (Hardcoded/Inline agar aman di Pi Browser tanpa module error) -->
    <script>
        // Kita definisikan config langsung di sini untuk login page agar lebih stabil
        // Pastikan nilai ini sesuai dengan environment Anda
        window.APP_CONFIG = {
            IS_SANDBOX: true, // Ubah ke false jika Mainnet
            SUPABASE_URL: "https://lrzaiftdikcjehtlbwlg.supabase.co",
            SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpa2FwcXVodXNid2pjY2JxY3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjQ1NTQsImV4cCI6MjA4NDc0MDU1NH0.X278oHDF0be7oa25484eliSukSYAYvDbJyU6ysz83zA",
            PI: {
                APP_ID: "26949299605f32"
            }
        };
    </script>
    
    <!-- Supabase Client (UMUMNYA V2) -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Animated Background Elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <!-- Login Card -->
    <div class="login-card">
        <div class="logo-icon"><i class="fas fa-leaf"></i></div>
        <h1>Selamat Datang</h1>
        <p class="subtitle">Bergabung dengan GreenProof.<br>Hubungkan dompet Pi Anda untuk memulai aksi hijau.</p>
        
        <button id="btn-login" class="btn-pi">
            <span class="btn-text"><i class="fab fa-pi"></i> Masuk dengan Pi Network</span>
            <div class="spinner"></div>
        </button>
        
        <p style="margin-top: 20px; font-size: 0.75rem; color: #94a3b8;">
            <i class="fas fa-lock"></i> Aman & Terenkripsi
        </p>
    </div>

    <!-- LOGIC -->
    <script>
        const btnLogin = document.getElementById('btn-login');
        const btnText = document.querySelector('.btn-text');
        const spinner = document.querySelector('.spinner');

        // Fungsi Helper UI
        function setButtonState(state) {
            btnLogin.className = 'btn-pi';
            
            if (state === 'loading') {
                btnLogin.classList.add('loading');
                btnLogin.disabled = true;
            } else if (state === 'success') {
                btnLogin.classList.add('success');
                btnLogin.innerHTML = `<span class="btn-text"><i class="fas fa-check"></i> Berhasil Masuk!</span>`;
                spinner.style.display = 'none';
            } else if (state === 'error') {
                btnLogin.classList.add('error');
                btnLogin.innerHTML = `<span class="btn-text"><i class="fas fa-times"></i> Coba Lagi</span>`;
                spinner.style.display = 'none';
                btnLogin.disabled = false;
            } else {
                btnLogin.innerHTML = `<span class="btn-text"><i class="fab fa-pi"></i> Masuk dengan Pi Network</span><div class="spinner"></div>`;
                spinner.style.display = 'none';
                btnLogin.disabled = false;
            }
        }

        // Event Listener Login
        btnLogin.addEventListener('click', async () => {
            setButtonState('loading');

            try {
                // 1. Cek Ketersediaan SDK
                const Pi = window.Pi;
                if (!Pi) {
                    throw new Error("Pi SDK tidak ditemukan. Harap buka di Pi Browser.");
                }

                // 2. Init SDK v2.0 (Format Object Config)
                await Pi.init({ 
                    version: "2.0", 
                    sandbox: window.APP_CONFIG.IS_SANDBOX 
                });

                // 3. Authenticate
                const authResult = await Pi.authenticate(['username', 'payments'], {
                    onIncompletePaymentFound: (payment) => {
                        console.log("Incomplete payment found:", payment.identifier);
                        // Logic handle incomplete bisa ditambahkan di sini
                    }
                });

                if (!authResult || !authResult.user) {
                    throw new Error("Autentikasi dibatalkan.");
                }

                const piUser = authResult.user;
                console.log("Pi Auth Success:", piUser);

                // 4. Inisialisasi Supabase Client
                const supabase = window.supabase.createClient(
                    window.APP_CONFIG.SUPABASE_URL,
                    window.APP_CONFIG.SUPABASE_ANON_KEY
                );

                // 5. Cek & Sinkronisasi Database
                const { data: dbUser, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('wallet_address', piUser.uid)
                    .maybeSingle();

                let finalUserId;
                let isNewUser = false;

                if (!dbUser) {
                    // Registrasi User Baru
                    const { data: newUser, error: insertError } = await supabase
                        .from('users')
                        .insert([{
                            id: crypto.randomUUID(),
                            username: piUser.username || 'Pioneer',
                            wallet_address: piUser.uid,
                            reputation: 100,
                            status: 'active'
                        }])
                        .select();

                    if (insertError) throw insertError;
                    // Supabase v2 insert return data di dalam array
                    finalUserId = newUser[0].id;
                    isNewUser = true;
                } else {
                    finalUserId = dbUser.id;
                }

                // 6. Simpan Session
                const sessionData = {
                    id: finalUserId,
                    pi_uid: piUser.uid,
                    username: piUser.username || 'Pioneer',
                    accessToken: authResult.accessToken
                };
                localStorage.setItem('greenproof_user', JSON.stringify(sessionData));

                setButtonState('success');
                
                // Redirect
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1200);

            } catch (error) {
                console.error("Login Error:", error);
                alert("Error: " + error.message); // Fallback alert
                setButtonState('error');
            }
        });
    </script>
</body>
</html>
