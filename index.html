<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak Tani Marketplace</title>
    
    <!-- Link CSS yang SUDAH DIPERBAIKI -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Font Awesome Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Script Injeksi Vercel/Netlify -->
    <script>
        window.ENV = {
            SUPABASE_URL: "%VITE_SUPABASE_URL%",
            SUPABASE_KEY: "%VITE_SUPABASE_ANON_KEY%"
        };
    </script>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="brand"><i class="fa-solid fa-leaf"></i> PAK TANI</div>
        <div class="nav-controls">
            <div style="cursor:pointer;">
                <i class="fa-solid fa-basket-shopping"></i> <span id="cartCount">0</span>
            </div>
            <div id="authSection">
                <button class="btn btn-pi" id="btnLogin">Login Pi</button>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <div class="hero">
        <h1>Pasar Digital Petani</h1>
        <p>Jual hasil panenmu, atau beli kebutuhan dapur.</p>
    </div>

    <!-- CONTAINER -->
    <div class="container">
        
        <!-- PANEL ADMIN (Hanya muncul jika Mode Penjual) -->
        <div id="adminPanel" class="admin-panel">
            <h3>Mode Penjual: Upload Produk</h3>
            <div id="uploadForm">
                <input type="text" id="pName" class="input" placeholder="Nama Produk">
                <input type="number" id="pPrice" class="input" placeholder="Harga (Rp)">
                <input type="text" id="pImg" class="input" placeholder="URL Gambar">
                <textarea id="pDesc" class="input" placeholder="Deskripsi"></textarea>
                <button class="btn btn-upload" onclick="saveProduct()">Upload ke Pasar</button>
            </div>
        </div>

        <h2>Katalog Pasar</h2>
        
        <!-- LOADING & GRID -->
        <div id="loading">Memuat...</div>
        <div id="productGrid" class="grid"></div>

    </div>

    <!-- LINK KE JS (Tetap di folder js) -->
    <script src="js/script.js"></script>
</body>
</html>
